<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book Recommender System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<style>
    body {
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        color: #eee;
        font-family: 'Segoe UI', sans-serif;
    }
    .navbar { background-color: #00a65a !important; }
    .navbar-brand, .nav-link { color: white !important; font-weight: 600; }
    .hero { text-align: center; padding: 40px 0 20px; }
    .hero h1 { font-size: 2.8rem; font-weight: 700; }
    .search-box {
        max-width: 500px;
        margin: 0 auto 30px;
        display: flex;
        gap: 10px;
    }
    .search-box input {
        border-radius: 8px;
        border: none;
        padding: 12px;
    }
    .search-box button {
        border-radius: 8px;
        background-color: #00a65a;
        border: none;
        color: white;
        padding: 12px 24px;
        font-weight: 600;
    }
    .message-box {
        max-width: 600px;
        margin: 0 auto 20px;
        text-align: center;
        background: #20263b;
        padding: 10px 16px;
        border-radius: 8px;
        color: #ffd166;
    }
    .book-card {
        background: #20263b;
        border-radius: 12px;
        overflow: hidden;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        margin-top: 30px;
        height: 100%;
    }
    .book-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    .book-card img { width: 100%; height: 260px; object-fit: cover; }
    .book-card .card-body { padding: 15px; }
    .book-title { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
    .book-author { color: #9aa0b5; font-size: 0.9rem; }
</style>
<body>

    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand">📚 My Book Recommender</a>
            <ul class="nav">
                <li><a class="nav-link" href="/">Home</a></li>
                <li><a class="nav-link" href="/recommend">Recommend</a></li>
            </ul>
        </div>
    </nav>

    <div class="hero">
        <h1>Find Similar Books</h1>
        <p style="color:#9aa0b5">Type a book title — even a near match works</p>
    </div>

    <form action="/recommend_books" method="post" class="search-box">
        <input name="user_input" type="text" class="form-control"
               placeholder="e.g. 1984, The Hobbit..."
               value="{{ searched if searched else '' }}">
        <button type="submit">Search</button>
    </form>

    {% if message %}
        <div class="message-box">{{ message }}</div>
    {% endif %}

    <div class="container">
        <div class="row">
            {% if data %}
                {% for i in data %}
                    <div class="col-md-3 col-sm-6">
                        <div class="book-card">
                            <img src="{{ i[2] }}" alt="{{ i[0] }}">
                            <div class="card-body">
                                <div class="book-title">{{ i[0] }}</div>
                                <div class="book-author">{{ i[1] }}</div>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            {% endif %}
        </div>
    </div>

    <div style="height:50px"></div>
</body>
</html>
